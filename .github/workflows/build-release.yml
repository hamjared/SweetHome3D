name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew jarExecutable jarExecutableWithPlugin

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'version = ' build.gradle.kts | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## Automated Build Release

            Built from commit: ${{ github.sha }}

            ### Download Options

            **Option 1: Everything Bundled (Recommended)**
            - **SweetHome3D-${{ steps.version.outputs.version }}-with-plugin.jar** - Main application with Cost Estimator plugin already included
            - Simply run: `java -jar SweetHome3D-${{ steps.version.outputs.version }}-with-plugin.jar`

            **Option 2: Separate Components**
            - **SweetHome3D-${{ steps.version.outputs.version }}.jar** - Main application only
            - **CostEstimatorPlugin.jar** - Cost Estimator plugin (place in ~/.sweethome3d/plugins/)

            ### Features
            - Java 21 LTS
            - Gradle-based build system
            - Cost Estimator plugin for construction cost estimation (framing, drywall, electrical, plumbing, etc.)

            ### Installation
            Use the bundled version for simplicity: `java -jar SweetHome3D-${{ steps.version.outputs.version }}-with-plugin.jar`

      - name: Upload bundled JAR (with plugin)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./install/SweetHome3D-${{ steps.version.outputs.version }}-with-plugin.jar
          asset_name: SweetHome3D-${{ steps.version.outputs.version }}-with-plugin.jar
          asset_content_type: application/java-archive

      - name: Upload main JAR (without plugin)
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./install/SweetHome3D-${{ steps.version.outputs.version }}.jar
          asset_name: SweetHome3D-${{ steps.version.outputs.version }}.jar
          asset_content_type: application/java-archive

      - name: Upload plugin JAR
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./install/plugins/CostEstimatorPlugin.jar
          asset_name: CostEstimatorPlugin.jar
          asset_content_type: application/java-archive
