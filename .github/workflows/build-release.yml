name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-jars:
    name: Build JARs (Linux)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew jarExecutable jarExecutableWithPlugin

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'version = ' build.gradle.kts | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Create distribution with pre-bundled plugin
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIST_DIR="build/dist/SweetHome3D-${VERSION}"
          mkdir -p "$DIST_DIR/plugins"

          # Copy main JAR
          cp "install/SweetHome3D-${VERSION}.jar" "$DIST_DIR/"

          # Copy plugin JAR to plugins directory
          cp "install/plugins/CostEstimatorPlugin.jar" "$DIST_DIR/plugins/"

          # Create run script for Linux/Mac
          cat > "$DIST_DIR/run.sh" << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
          java -jar "$DIR/SweetHome3D-*.jar"
          EOF
          chmod +x "$DIST_DIR/run.sh"

          # Create run script for Windows
          cat > "$DIST_DIR/run.bat" << 'EOF'
          @echo off
          cd /d "%~dp0"
          for /f %%F in ('dir /b SweetHome3D-*.jar') do (
              java -jar "%%F"
              exit /b !ERRORLEVEL!
          )
          EOF

          # Create README
          cat > "$DIST_DIR/README.txt" << 'EOF'
          Sweet Home 3D v${{ steps.version.outputs.version }}

          Cost Estimator plugin is pre-installed and ready to use!

          To run:
          - Linux/Mac: ./run.sh
          - Windows: run.bat
          - Or: java -jar SweetHome3D-*.jar

          The Cost Estimator is available under Tools menu when you have a floor plan open.
          EOF

          echo "Distribution created in $DIST_DIR"

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          files: |
            build/dist/SweetHome3D-${{ steps.version.outputs.version }}/SweetHome3D-${{ steps.version.outputs.version }}.jar
            build/dist/SweetHome3D-${{ steps.version.outputs.version }}/plugins/CostEstimatorPlugin.jar
            build/dist/SweetHome3D-${{ steps.version.outputs.version }}/run.sh
            build/dist/SweetHome3D-${{ steps.version.outputs.version }}/run.bat
            build/dist/SweetHome3D-${{ steps.version.outputs.version }}/README.txt
          body: |
            ## Automated Build Release

            Built from commit: ${{ github.sha }}

            ### Windows Downloads

            **Option 1: Windows Bundle ZIP (no install, no SmartScreen issues)**
            - Download: `SweetHome3D-${{ steps.version.outputs.version }}-windows-bundle.zip`
            - Unzip anywhere and double-click `SweetHome3D.bat` — Java is bundled, nothing to install

            **Option 2: Windows Installer**
            - Download: `SweetHome3D-${{ steps.version.outputs.version }}.exe`
            - Installs to Program Files with Start Menu shortcut; may be flagged by Windows Smart App Control on first run

            ### Other Platforms (requires Java 21)

            **Cross-Platform Bundle**
            - Download `SweetHome3D-${{ steps.version.outputs.version }}.jar` + `CostEstimatorPlugin.jar`
            - Run: `./run.sh` (Linux/Mac) or `run.bat` (Windows)

            ### Features
            - ✅ Java 21 LTS
            - ✅ Cost Estimator plugin pre-installed (Tools → Cost Estimator...)
            - ✅ Calculates: Framing, drywall, paint, flooring, electrical, plumbing, doors, windows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: build-jars
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew jarExecutableWithPlugin

      - name: Prepare plugin for installer
        shell: pwsh
        run: |
          $VERSION = ((Get-Content build.gradle.kts | Select-String 'version = "([^"]+)"').Matches[0].Groups[1].Value)
          $APP_DIR = "build/app/SweetHome3D/plugins"
          New-Item -ItemType Directory -Path $APP_DIR -Force | Out-Null
          Copy-Item "install/plugins/CostEstimatorPlugin.jar" $APP_DIR
          Write-Host "✓ Plugin prepared for installer"

      - name: Create Windows installer
        shell: pwsh
        run: |
          # Extract version from build.gradle.kts
          $versionLine = Get-Content build.gradle.kts | Select-String 'version = "'
          $VERSION = [regex]::Match($versionLine, 'version = "([^"]+)"').Groups[1].Value
          Write-Host "Building installer for version: $VERSION"

          # Create output directory
          $OUTPUT_DIR = "build/installer"
          New-Item -ItemType Directory -Path $OUTPUT_DIR -Force | Out-Null

          # Find Java bin directory
          $JAVA_HOME = $env:JAVA_HOME
          Write-Host "JAVA_HOME: $JAVA_HOME"

          # Build installer using jpackage with app content
          & "$JAVA_HOME/bin/jpackage.exe" `
            --input install `
            --name SweetHome3D `
            --main-jar "SweetHome3D-$VERSION-with-plugin.jar" `
            --main-class com.eteks.sweethome3d.SweetHome3DBootstrap `
            --type exe `
            --dest $OUTPUT_DIR `
            --app-version $VERSION `
            --vendor "Space Mushrooms" `
            --description "Sweet Home 3D - Interior 2D design with Cost Estimator and native Java3D rendering" `
            --app-content "build/app/SweetHome3D" `
            --win-menu `
            --win-menu-group "SweetHome3D" `
            --win-shortcut

          if ($LASTEXITCODE -ne 0) {
            Write-Error "jpackage failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          Write-Host "✓ Windows installer created successfully"
          Get-ChildItem "$OUTPUT_DIR" -Filter "*.exe" | ForEach-Object {
            $sizeMB = [math]::Round($_.Length / 1MB, 2)
            Write-Host "✓ Generated: $($_.Name) ($sizeMB MB)"
          }

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build-jars.outputs.version }}
          files: ./build/installer/SweetHome3D-${{ needs.build-jars.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-bundle:
    name: Build Windows Bundle ZIP
    runs-on: windows-latest
    needs: build-jars
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew jarExecutableWithPlugin

      - name: Download Temurin JRE 21
        shell: pwsh
        run: |
          $JRE_URL = "https://api.adoptium.net/v3/binary/latest/21/ga/windows/x64/jre/hotspot/normal/eclipse"
          Write-Host "Downloading Temurin JRE 21..."
          Invoke-WebRequest -Uri $JRE_URL -OutFile "temurin-jre-21.zip" -MaximumRedirection 5
          Expand-Archive -Path "temurin-jre-21.zip" -DestinationPath "jre-extract"
          $JRE_DIR = Get-ChildItem "jre-extract" -Directory | Select-Object -First 1
          Move-Item $JRE_DIR.FullName "bundled-jre"
          Write-Host "JRE ready: $(Get-ChildItem bundled-jre/bin/java*.exe | Select-Object -ExpandProperty Name)"

      - name: Create Windows bundle ZIP
        shell: pwsh
        run: |
          $VERSION = [regex]::Match((Get-Content build.gradle.kts | Out-String), 'version = "([^"]+)"').Groups[1].Value
          Write-Host "Building bundle for version: $VERSION"

          $BUNDLE_DIR = "build/bundle/SweetHome3D-$VERSION-windows"
          New-Item -ItemType Directory -Path "$BUNDLE_DIR/plugins" -Force | Out-Null

          # Copy JARs
          Copy-Item "install/SweetHome3D-$VERSION-with-plugin.jar" "$BUNDLE_DIR/SweetHome3D-$VERSION.jar"
          Copy-Item "install/plugins/CostEstimatorPlugin.jar" "$BUNDLE_DIR/plugins/"

          # Copy bundled JRE
          Copy-Item "bundled-jre" "$BUNDLE_DIR/jre" -Recurse

          # Copy Java3D native DLLs into jre/bin so JogAmp's native loader finds them
          # JogAmp (JNILibLoaderBase) explicitly checks {java.home}/bin before java.library.path
          Copy-Item "lib/java3d-1.6/windows/x64/*.dll" "$BUNDLE_DIR/jre/bin/"

          # Launcher: use start "" to detach so the cmd window closes immediately
          @"
          @echo off
          cd /d "%~dp0"
          for %%F in (SweetHome3D-*.jar) do (
              start "" jre\bin\javaw.exe -jar "%%F"
              exit /b
          )
          "@ | Set-Content -Path "$BUNDLE_DIR/SweetHome3D.bat" -Encoding ASCII

          # README
          @"
          Sweet Home 3D v$VERSION - Windows Bundle

          No installation required. Unzip anywhere and double-click SweetHome3D.bat
          Java is bundled — nothing else needed.

          The Cost Estimator plugin is pre-installed (Tools menu).
          All files must remain in the same folder.
          "@ | Set-Content -Path "$BUNDLE_DIR/README.txt" -Encoding UTF8

          $ZIP_PATH = "build/bundle/SweetHome3D-$VERSION-windows-bundle.zip"
          Compress-Archive -Path "$BUNDLE_DIR" -DestinationPath $ZIP_PATH
          $sizeMB = [math]::Round((Get-Item $ZIP_PATH).Length / 1MB, 2)
          Write-Host "Bundle ZIP: SweetHome3D-$VERSION-windows-bundle.zip ($sizeMB MB)"

      - name: Upload Windows bundle
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build-jars.outputs.version }}
          files: ./build/bundle/SweetHome3D-${{ needs.build-jars.outputs.version }}-windows-bundle.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
